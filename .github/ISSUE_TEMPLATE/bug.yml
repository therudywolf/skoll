name: Bug report
description: Something broke
title: "[bug] <short>"
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: OS, Python, Node, LM Studio version, model

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: REDACT secrets first.

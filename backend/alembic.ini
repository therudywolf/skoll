# Alembic config for the Skoll backend (issue phase-1.15).
#
# The database URL is NOT hardcoded here — env.py derives it at runtime from
# skoll.config.Settings.db_path (an aiosqlite URL). The placeholder below is only a
# fallback so `alembic` can be invoked from any cwd.
#
# Usage (from backend/):
#   uv run --no-sync alembic upgrade head
#   uv run --no-sync alembic downgrade base
#   SKOLL_DB_PATH=./.skoll_cache/skoll.sqlite uv run --no-sync alembic upgrade head

[alembic]
# Migration scripts live alongside the package, under backend/migrations.
script_location = migrations

# Prepend backend/ to sys.path so `import skoll...` resolves in env.py.
prepend_sys_path = .

path_separator = os

# Fallback only — overridden in env.py from Settings.db_path.
sqlalchemy.url = sqlite+aiosqlite:///./.skoll_cache/skoll.sqlite


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
